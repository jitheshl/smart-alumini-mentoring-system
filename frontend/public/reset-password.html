<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — AlumniConnect</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-brand">
      <div class="brand-logo">
        <div class="brand-logo-icon">🔑</div>
        <span class="brand-logo-text">AlumniConnect</span>
      </div>
      <h1 class="brand-tagline">Set New<br><span>Password</span></h1>
      <p class="brand-desc">Almost there! Create a strong password to secure your account.</p>
    </div>

    <div class="auth-form-panel">
      <h2>New Password</h2>
      <p class="auth-subtitle">Enter your new credentials below</p>

      <div class="auth-alert" id="auth-alert"></div>

      <form id="reset-form" novalidate autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="new-password">New Password</label>
          <div class="input-group">
            <span class="input-icon">🔒</span>
            <input class="form-control" type="password" id="new-password" name="new-password" placeholder="Min 6 characters" required>
          </div>
          <span class="form-error" id="new-password-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm Password</label>
          <div class="input-group">
            <span class="input-icon">🛡️</span>
            <input class="form-control" type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>
          </div>
          <span class="form-error" id="confirm-password-error"></span>
        </div>

        <button type="submit" class="btn-auth" id="submit-btn">
          <span id="btn-text">Reset Password</span>
        </button>
      </form>

      <div class="auth-footer">
        <p>Return to <a href="/">Sign In</a></p>
      </div>
    </div>
  </div>

  <script type="module" src="/js/reset-password.js"></script>
</body>
</html>
