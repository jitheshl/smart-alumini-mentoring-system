<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Requests — AlumniConnect</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <a href="/student/dashboard.html" class="sidebar-brand">
        <div class="sidebar-brand-icon">🎓</div>
        <span class="sidebar-brand-text">AlumniConnect</span>
      </a>
      <div class="sidebar-user">
        <div id="sb-avatar"></div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sb-name">Loading…</div>
          <div class="sidebar-user-role">Student</div>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">Main</div>
        <a href="/student/dashboard.html" class="nav-item"><span class="nav-item-icon">🏠</span> Dashboard</a>
        <a href="/student/profile.html" class="nav-item"><span class="nav-item-icon">👤</span> My Profile</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">Network</div>
        <a href="/student/mentors.html" class="nav-item"><span class="nav-item-icon">🤝</span> Find Mentors</a>
        <a href="/student/my-mentors.html" class="nav-item"><span class="nav-item-icon">👨‍🏫</span> My Mentors</a>
        <a href="/student/jobs.html" class="nav-item"><span class="nav-item-icon">💼</span> Jobs &amp; Internships</a>
        <a href="/student/requests.html" class="nav-item active"><span class="nav-item-icon">📨</span> My Requests</a>
        <a href="/student/meetings.html" class="nav-item"><span class="nav-item-icon">📅</span> My Meetings</a>
        <a href="/student/chat.html" class="nav-item"><span class="nav-item-icon">💬</span> Chat</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">Safety</div>
        <a href="/student/complaints.html" class="nav-item"><span class="nav-item-icon">🚩</span> Complaints</a>
      </div>
      <div class="sidebar-footer">
        <button class="nav-item" id="logout-btn"><span class="nav-item-icon">🚪</span> Logout</button>
      </div>
    </aside>
    <main class="main-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">My Mentorship Requests</h1>
          <p class="page-subtitle">Track all your mentor connection requests</p>
        </div>
      </div>
      <div class="content-body">
        <div class="tab-bar">
          <button class="tab-btn active" data-status="all">All</button>
          <button class="tab-btn" data-status="pending">Pending</button>
          <button class="tab-btn" data-status="accepted">Accepted</button>
          <button class="tab-btn" data-status="rejected">Rejected</button>
        </div>
        <div id="requests-list">
          <div class="flex-center" style="padding:60px 0;"><div class="spinner"></div></div>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="/js/requests.js"></script>

  <!-- Meeting Request Modal -->
  <div class="modal-overlay" id="meeting-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">📅 Request a Meeting</span>
        <button class="modal-close" id="close-meeting-modal">✕</button>
      </div>
      <div class="modal-body">
        <p class="text-sm" style="color:var(--text-secondary);margin-bottom:16px;">
          Request a 1-on-1 session with <strong id="meeting-alumni-name"></strong>.
        </p>
        <div class="form-group">
          <label class="form-label">Reason for Meeting <span style="color:var(--danger);">*</span></label>
          <textarea class="form-textarea" id="meeting-reason" placeholder="e.g. Career guidance, resume review, interview prep..." rows="5"></textarea>
        </div>
        <input type="hidden" id="meeting-alumni-id">
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="cancel-meeting-modal">Cancel</button>
        <button class="btn btn-primary" id="send-meeting-btn" style="background:var(--success);">📅 Send Meeting Request</button>
      </div>
    </div>
  </div>
</body>
</html>
